name: build web

# Rebuild of the static cap2UI5 browser site: mirror the upstream cap2UI5
# repo, bundle backend + samples + frontend, and publish the result to the
# dedicated build repo cap2UI5/web-cap2UI5-built. The build is also uploaded
# as the workflow artifact `cap2ui5-web`.
#
# Runs event-driven on every push to main. That includes the trigger
# commits cap2UI5's sync pipeline pushes here via deploy key (its
# 7_trigger_web workflow updates UPSTREAM_HEAD after each upstream
# change), so the site follows every cap2UI5 update — plus changes to the
# build tooling itself. The weekly cron remains as a safety net.
#
# The built site is pushed to the `main` branch of cap2UI5/web-cap2UI5-built
# — one commit per deployment, so `git log`/`git diff` on that repo shows
# exactly what changed between two deployments. GitHub Pages of that repo
# serves the site (Settings → Pages → Deploy from a branch → main / root).
# This repo holds only the tooling.
#
# Cross-repo push uses an SSH deploy key: the public half is registered on
# web-cap2UI5-built with write access, the private half is the secret
# BUILT_DEPLOY_KEY here.

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 3 * * 0" # Sundays 03:00 UTC — weekly safety net
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-built
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm ci
      - run: npm run mirror
      - run: npm run build
      - name: report upstream revision
        run: echo "built from cap2UI5/cap2UI5@$(cat input/cap2UI5/UPSTREAM_COMMIT)" >> "$GITHUB_STEP_SUMMARY"
      # Publish the exact files that make up the site to the main branch of
      # cap2UI5/web-cap2UI5-built — one commit per deployment. GitHub Pages
      # of that repo serves this branch, so pushing here IS the deploy.
      # Identical rebuilds (e.g. the weekly cron with no upstream change)
      # produce no commit. The `deploy-built` concurrency group serializes
      # runs, so pushes cannot race each other.
      - name: publish built site to web-cap2UI5-built
        if: github.ref == 'refs/heads/main'
        env:
          BUILT_DEPLOY_KEY: ${{ secrets.BUILT_DEPLOY_KEY }}
        run: |
          set -euo pipefail
          UPSTREAM=$(cat input/cap2UI5/UPSTREAM_COMMIT)
          BUILT="$RUNNER_TEMP/web-cap2UI5-built"

          # SSH deploy key with write access to the built repo
          mkdir -p ~/.ssh
          echo "$BUILT_DEPLOY_KEY" > ~/.ssh/built_key
          chmod 600 ~/.ssh/built_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/built_key -o IdentitiesOnly=yes"

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git clone --depth 1 --branch main \
            git@github.com:cap2UI5/web-cap2UI5-built.git "$BUILT"

          # Replace the tracked site with the freshly built one, keep .git.
          # .nojekyll stops GitHub Pages from Jekyll-processing the bundle.
          find "$BUILT" -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a dist/. "$BUILT"/
          touch "$BUILT/.nojekyll"

          cd "$BUILT"
          git add -A
          if git diff --cached --quiet; then
            echo "site unchanged — no deploy commit" >> "$GITHUB_STEP_SUMMARY"
          else
            git commit -m "deploy: built from cap2UI5/cap2UI5@${UPSTREAM}" \
              -m "tooling: ${GITHUB_SHA}" \
              -m "run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            git push origin HEAD:main
            echo "deployed to cap2UI5/web-cap2UI5-built@main: $(git rev-parse --short HEAD)" >> "$GITHUB_STEP_SUMMARY"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: cap2ui5-web
          path: dist
